# ─────────────────────────────────────────────────────────────
# BizFlow — full stack: frontend, backend, postgres(+pgvector),
# redis, celery worker, celery beat.
# Bring up with:  docker compose up --build
# ─────────────────────────────────────────────────────────────

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bizflow
      POSTGRES_PASSWORD: bizflow
      POSTGRES_DB: bizflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://bizflow:bizflow@postgres:5432/bizflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production-please-min-32-chars
      CORS_ORIGINS: http://localhost,http://localhost:80
      # No demo data — create the first account via sign-up. Set "true" only
      # to load sample data for evaluation.
      SEED_ON_STARTUP: "false"
      AI_PROVIDER: mock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery-worker:
    build: ./backend
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://bizflow:bizflow@postgres:5432/bizflow
      REDIS_URL: redis://redis:6379/0
      AI_PROVIDER: mock
    depends_on:
      - backend
      - redis

  celery-beat:
    build: ./backend
    command: celery -A app.workers.celery_app:celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://bizflow:bizflow@postgres:5432/bizflow
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  landing:
    build: ./landing
    ports:
      - "8080:80"

volumes:
  pgdata:
